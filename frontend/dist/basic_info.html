<!DOCTYPE html>
<html lang="zh">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>个人信息 - MindChat</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" type="text/css" href="./css/materialdesignicons.min.css">
  <link rel="stylesheet" type="text/css" href="./css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="./css/animate.min.css">2
  <link rel="stylesheet" type="text/css" href="./css/style.min.css">
</head>

<body>
  <div class="container-fluid">

    <div class="row">

      <div class="col-lg-12">
        <div class="card">
          <header class="card-header">
            <div class="card-title">个人信息</div>
          </header>
          <div class="card-body">
            <form method="" action="#!" class="site-form">
              <div class="mb-3">
                <label for="username">姓名</label>
                <input type="text" class="form-control" name="username" id="username" disabled="disabled">
              </div>
              <div class="mb-3">
                <label for="sex">性别</label>
                <input type="text" class="form-control" name="sex" id="sex" disabled="disabled">
              </div>
              <div class="mb-3">
                <label for="age">年龄</label>
                <input type="text" class="form-control" name="age" id="age" placeholder="输入您的年龄">
              </div>
              <div class="mb-3">
                <label for="phone">联系方式</label>
                <input type="text" class="form-control" name="phone" id="phone" aria-describedby="phoneHelp"
                  placeholder="请输入您的联系方式">
                <small id="phoneHelp" class="form-text text-muted">请保证您填写的联系方式是正确的。</small>
              </div>
              <div class="mb-3">
                <label for="role">账号角色</label>
                <input type="text" class="form-control" name="role" id="role" disabled="disabled">
              </div>
              <div class="mb-3">
                <label for="age">帐号状态</label>
                <span id="account-status-active" style="display: none;">🟢状态正常</span>
                <span id="account-status-inactive" style="display: none;">🔴状态异常</span>
              </div>
              <button type="submit" class="btn btn-primary">保存</button>
            </form>

          </div>
        </div>
      </div>

    </div>

  </div>
  <script type="text/javascript" src="./js/jquery.min.js"></script>
  <script type="text/javascript" src="./js/popper.min.js"></script>
  <script type="text/javascript" src="./js/bootstrap.min.js"></script>
  <script type="text/javascript" src="./js/main.min.js"></script>
  <script type="text/javascript" src="./js/lyear-loading.js"></script>
  <script type="text/javascript" src="./js/bootstrap-notify.min.js"></script>
  <script type="text/javascript" src="./config.js"></script>
  <script type="text/javascript" src="./basic_info.js"></script>
</body>

</html>
