services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotion_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app/data
      - audio_uploads:/app/uploads/audio
      - ./backend/app:/app/app
      - ./backend/main.py:/app/app/main.py
    networks:
      - emotion_net

