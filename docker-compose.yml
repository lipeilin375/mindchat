version: "3.9"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotion_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app/data
      - audio_uploads:/app/uploads/audio
      - ./backend/app:/app/app
      - ./backend/main.py:/app/app/main.py
      # - ./backend/entrypoint.sh:/app/entrypoint.sh
    # depends_on:
    #   ollama:
    #     condition: service_started
    networks:
      - emotion_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Ollama LLM service ───────────────────────────────────────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: emotion_ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama     # persists downloaded model weights
  #   networks:
  #     - emotion_net
  #   # Uncomment the following if you have an NVIDIA GPU:
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  sqlite_data:
  audio_uploads:
  ollama_models:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  emotion_net:
    driver: bridge