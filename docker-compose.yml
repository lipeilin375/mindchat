services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotion_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app/data
      - audio_uploads:/app/uploads/audio
      - ./backend/app:/app/app
      - ./backend/main.py:/app/app/main.py
    networks:
      - emotion_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Worker（异步分析任务队列消费者）─────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotion_worker
    restart: unless-stopped
    command: python /app/app/emotion_analyze_worker.py
    env_file:
      - ./backend/.env
    environment:
      POLL_INTERVAL_SEC: "3"
    volumes:
      - sqlite_data:/app/data
      - audio_uploads:/app/uploads/audio
      - ./backend/app:/app/app
    networks:
      - emotion_net
    depends_on:
      backend:
        condition: service_healthy
    # 如需 GPU 加速 Whisper / wav2vec2，取消下方注释：
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "8080:80"       # 本地 8080 → 容器 80
    restart: unless-stopped

  # ── Ollama LLM service ───────────────────────────────────────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: emotion_ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   networks:
  #     - emotion_net
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  sqlite_data:
  audio_uploads:
  ollama_models:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  emotion_net:
    driver: bridge